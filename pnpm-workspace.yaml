# pnpm workspace definition for VideoDubber.
#
# Only TypeScript/Node packages participate in the pnpm workspace.
# The Python workers (workers/stt-worker, workers/translation-worker,
# workers/tts-worker) are NOT pnpm packages — they are managed with
# their own virtualenvs / requirements.txt and launched via scripts/.
packages:
  - 'packages/*'
  - 'workers/media-worker'
  - 'apps/desktop'
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
minimumReleaseAgeExclude:
  - '@angular-devkit/architect@0.2200.4'
  - '@angular-devkit/build-angular@22.0.4'
  - '@angular-devkit/build-webpack@0.2200.4'
  - '@angular-devkit/core@22.0.4'
  - '@angular-devkit/schematics@22.0.4'
  - '@angular/build@22.0.4'
  - '@angular/cli@22.0.4'
  - '@ngtools/webpack@22.0.4'
  - '@schematics/angular@22.0.4'
  - '@types/node@26.0.1'
